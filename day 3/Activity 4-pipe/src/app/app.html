<main>
  <h1>Pipe Examples</h1>

  <p><strong>Uppercase:</strong> {{ name | uppercase }}</p>
  <hr>

  <p><strong>Date:</strong> {{ today | date: 'EEEE, MMMM d, y' }}</p>
  <hr>

  <p><strong>Currency:</strong> {{ salary | currency }}</p>
  <hr>

  <p><strong>Custom Pipe:</strong> {{ text | myPipe }}</p>
</main>
